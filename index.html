<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>たんぽぽ歯科マニュアル</title>
<link rel="icon" href="assets/logo.png">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="lock-screen" class="lock-screen">
  <form id="lock-form" class="lock-form">
    <img class="site-logo" src="assets/logo.png" alt="たんぽぽ歯科ロゴ">
    <p>パスワードを入力してください</p>
    <input type="password" id="lock-password" placeholder="パスワード" autocomplete="off">
    <p id="lock-error" class="lock-error" hidden>パスワードが違います。</p>
    <button type="submit">入る</button>
  </form>
</div>

<div id="site-content" hidden>
<header class="site-header">
  <img class="site-logo" src="assets/logo.png" alt="たんぽぽ歯科ロゴ">
  <h1>たんぽぽ歯科マニュアル</h1>
  <div class="header-actions">
    <a class="post-link" href="https://docs.google.com/forms/d/e/1FAIpQLSenAoklKjuOjuqcrCn4UgWpSXF5dpECI_UanevwykuufVN8_w/viewform" target="_blank" rel="noopener">＋ 投稿する</a>
    <a class="post-link report-link" href="https://docs.google.com/forms/d/e/1FAIpQLSd-FISAFZAFbNzn-xcIXYWBmDg3mW0gT9bZ6ZwtVpXHpKjM4Q/viewform" target="_blank" rel="noopener">修正を報告する</a>
  </div>
</header>

<main>
  <div id="media-tabs" class="media-tabs" role="tablist" aria-label="動画・写真で絞り込み">
    <button type="button" class="media-tab" data-media="all">すべて</button>
    <button type="button" class="media-tab" data-media="video">動画</button>
    <button type="button" class="media-tab" data-media="photo">写真</button>
    <button type="button" class="media-tab" data-media="favorite">お気に入り</button>
  </div>

  <div class="controls">
    <input type="search" id="search-input" placeholder="タイトルや説明で検索..." aria-label="動画を検索">
    <select id="sort-select" aria-label="並び替え">
      <option value="new">投稿が新しい順</option>
      <option value="old">投稿が古い順</option>
      <option value="views-desc">再生数が多い順</option>
      <option value="views-asc">再生数が少ない順</option>
    </select>
    <div id="category-filters" class="category-filters" role="group" aria-label="カテゴリで絞り込み"></div>
  </div>

  <p id="empty-message" class="empty-message" hidden>該当する動画が見つかりませんでした。</p>

  <div id="video-grid" class="video-grid"></div>
</main>

<div id="video-modal" class="modal" hidden>
  <div class="modal-backdrop" data-close></div>
  <div class="modal-content">
    <button type="button" class="modal-close" data-close aria-label="閉じる">&times;</button>
    <button type="button" id="modal-favorite-btn" class="modal-favorite-btn" aria-label="お気に入りに追加">♡</button>
    <div id="modal-video-wrap" class="modal-video-wrap">
      <iframe id="modal-iframe" src="" allow="autoplay" allowfullscreen></iframe>
    </div>
    <div id="modal-photo-wrap" class="modal-photo-wrap" hidden>
      <img id="modal-photo" src="" alt="">
      <button type="button" id="modal-photo-prev" class="modal-photo-nav modal-photo-prev" aria-label="前の写真">&#10094;</button>
      <button type="button" id="modal-photo-next" class="modal-photo-nav modal-photo-next" aria-label="次の写真">&#10095;</button>
      <span id="modal-photo-count" class="modal-photo-count"></span>
    </div>
    <div class="modal-text">
      <h2 id="modal-title"></h2>
      <p id="modal-description"></p>
    </div>
  </div>
</div>
</div>

<script src="app.js"></script>
</body>
</html>
